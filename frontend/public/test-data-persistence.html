<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据持久化验证测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,1);
        }
        h1 {
            color: #667eea;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .button:hover {
            background: #5568d3;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 数据持久化验证测试页面</h1>
        <p>作者: 哈雷酱大小姐 (￣▽￣)／</p>

        <div class="status success">
            <strong>✅ 后端服务：</strong> http://localhost:5000 - 运行中
        </div>
        <div class="status success">
            <strong>✅ 前端服务：</strong> http://localhost:3000 - 运行中
        </div>
        <div class="status info">
            <strong>ℹ️ 测试目标：</strong> 验证前端能否正确显示后端MySQL中的历史数据
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalRecords">-</div>
                <div>总记录数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rfRecords">-</div>
                <div>RF模型</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="svrRecords">-</div>
                <div>SVR模型</div>
            </div>
        </div>

        <button class="button" onclick="loadData()">🔄 刷新数据</button>
        <button class="button" onclick="addTestData()">➕ 添加测试数据</button>

        <div id="loading" class="loading" style="display:none;">
            加载中...
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>样本编号</th>
                    <th>样本类型</th>
                    <th>A375</th>
                    <th>A405</th>
                    <th>A450</th>
                    <th>预测浓度(g/L)</th>
                    <th>模型</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        // 页面加载时自动获取数据
        window.onload = function() {
            loadData();
        };

        async function loadData() {
            const loading = document.getElementById('loading');
            const tableBody = document.getElementById('tableBody');

            loading.style.display = 'block';
            tableBody.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/api/history`);
                const data = await response.json();

                loading.style.display = 'none';

                // 更新统计信息
                document.getElementById('totalRecords').textContent = data.total;

                let rfCount = 0;
                let svrCount = 0;
                data.records.forEach(record => {
                    if (record.prediction.model_type === 'rf') rfCount++;
                    else svrCount++;
                });
                document.getElementById('rfRecords').textContent = rfCount;
                document.getElementById('svrRecords').textContent = svrCount;

                // 填充表格
                data.records.forEach(record => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${record.id}</td>
                        <td>${record.sample_info?.sample_id || '-'}</td>
                        <td>${record.sample_info?.sample_type || '-'}</td>
                        <td>${record.absorbance.a375}</td>
                        <td>${record.absorbance.a405}</td>
                        <td>${record.absorbance.a450}</td>
                        <td style="font-weight:bold;color:${record.prediction.concentration > 0 ? '#28a745' : '#999'}">
                            ${record.prediction.concentration}
                        </td>
                        <td>${record.prediction.model_type}</td>
                        <td>${record.prediction.timestamp}</td>
                    `;
                    tableBody.appendChild(row);
                });

                console.log('✅ 数据加载成功:', data.total, '条记录');

            } catch (error) {
                loading.style.display = 'none';
                console.error('❌ 加载失败:', error);
                tableBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:red;">加载失败: ' + error.message + '</td></tr>';
            }
        }

        async function addTestData() {
            const testData = {
                absorbance: {
                    a375: Math.random() * 0.3 + 0.1,
                    a405: Math.random() * 0.3 + 0.15,
                    a450: Math.random() * 0.2 + 0.08
                },
                sample_info: {
                    sample_id: 'WEB-TEST-' + Date.now(),
                    sample_type: 'Web页面测试',
                    notes: '从浏览器添加的测试数据'
                },
                model_type: 'rf'
            };

            try {
                const response = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });

                const result = await response.json();
                console.log('✅ 新数据添加成功:', result);

                // 刷新数据
                loadData();

            } catch (error) {
                console.error('❌ 添加失败:', error);
                alert('添加失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
